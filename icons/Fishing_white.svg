<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- 弯曲的鱼竿（闭合路径，窄弧形） -->
  <path d="
    M 3.8 22.8
    C 7.0 16.5, 12.0 7.0, 17.4 3.6
    C 16.6 2.8, 15.8 3.2, 15.0 4.0
    C 10.5 7.0, 6.0 15.8, 3.0 22.0
    Z
  " fill="#ffffff"/>

  <!-- 竿尖垂线（短的闭合矩形，模拟垂直短线） -->
  <path d="
    M 17.4 3.6
    L 18.2 4.2
    L 18.2 13.8
    L 17.4 13.3
    Z
  " fill="#ffffff"/>

  <!-- 菱形鱼身 -->
  <path d="
    M 14.6 17.5
    L 17.4 13.8
    L 20.4 17.5
    L 17.4 21.2
    Z
  " fill="#ffffff"/>

  <!-- 三角形鱼尾 -->
  <path d="
    M 17.4 21.2
    L 15.4 23.8
    L 19.7 23.8
    Z
  " fill="#ffffff"/>
</svg>